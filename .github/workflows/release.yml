name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint + Mypy
        run: uv run ruff check . && uv run mypy src

      - name: Pytest + Coverage
        run: uv run pytest --cov=diamond_setup --cov-fail-under=90

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: test-and-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publishing (OIDC) – kein Token nötig wenn PyPI-Project konfiguriert
        # Fallback: PYPI_API_TOKEN Secret setzen und unten einkommentieren
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  zenodo:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Zenodo DOI trigger
        run: |
          echo "Zenodo-Upload wird über GitHub-Zenodo Webhook-Integration ausgelöst."
          echo "Setup: https://zenodo.org/account/settings/github/ → Repo aktivieren"
          # Optional: zenodo-upload action einbinden wenn API-Token vorhanden:
          # uses: zenodo-org/zenodo-github-action@v1
